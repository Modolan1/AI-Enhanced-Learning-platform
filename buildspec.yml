version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - echo "Installing backend dependencies"
      - cd backend
      - npm ci

  build:
    commands:
      - echo "Preparing backend deployment artifact"

artifacts:
  base-directory: backend
  files:
    - '**/*'
    - '!node_modules/**/*'

cache:
  paths:
    - backend/node_modules/**/*
